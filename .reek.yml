# Reek configuration. See https://github.com/troessner/reek

exclude_paths:
  - .bundle
  - .git-hooks
  - test

detectors:
  UtilityFunction:
    public_methods_only: true
  TooManyStatements:
    max_statements: 10
  TooManyInstanceVariables:
    max_instance_variables: 5
  LongParameterList:
    max_params: 4
  TooManyMethods:
    max_methods: 20
